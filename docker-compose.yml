services:
  redis:
    image: redis:7-alpine
    container_name: ping-redis
    restart: unless-stopped
    volumes:
      - redis_data:/data

  redpanda:
    image: docker.redpanda.com/redpandadata/redpanda:v24.2.15
    container_name: ping-redpanda
    restart: unless-stopped
    command:
      - redpanda
      - start
      - --overprovisioned
      - --smp
      - "1"
      - --memory
      - "512M"
      - --reserve-memory
      - "0M"
      - --check=false
      - --kafka-addr
      - INTERNAL://0.0.0.0:9092,EXTERNAL://0.0.0.0:19092
      - --advertise-kafka-addr
      - INTERNAL://redpanda:9092,EXTERNAL://localhost:19092
    ports:
      - "9092:9092"
      - "19092:19092"
      - "9644:9644"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ping-backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      - REDIS_URL=redis://redis:6379
      - KAFKA_BROKERS=redpanda:9092
      - CLIENT_ORIGINS=http://localhost:5173,http://127.0.0.1:5173,http://localhost:5174,http://127.0.0.1:5174
      - DOTENV_CONFIG_PATH=/app/.env
      - CHOKIDAR_USEPOLLING=true
      - CHOKIDAR_INTERVAL=1000
    ports:
      - "8000:8000"
    command: sh -c "npx prisma generate && npm run dev"
    volumes:
      - ./backend:/app
      - backend_node_modules:/app/node_modules
    depends_on:
      - redis
      - redpanda

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ping-frontend
    restart: unless-stopped
    env_file:
      - ./frontend/.env.local
    environment:
      - CHOKIDAR_USEPOLLING=true
      - CHOKIDAR_INTERVAL=1000
      - WATCHPACK_POLLING=true
    ports:
      - "5173:5173"
    command: npm run dev -- --host 0.0.0.0 --port 5173
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    depends_on:
      - backend

volumes:
  redis_data:
  backend_node_modules:
  frontend_node_modules: